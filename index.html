
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Growth Catalyst Program</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
      /* ✅ Gilroy local font files (TTF) — from /public/fonts/ */
@font-face {
  font-family: "Gilroy";
  src: url("/fonts/Gilroy-Regular.ttf") format("truetype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: "Gilroy";
  src: url("/fonts/Gilroy-Medium.ttf") format("truetype");
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: "Gilroy";
  src: url("/fonts/Gilroy-Bold.ttf") format("truetype");
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: "Gilroy";
  src: url("/fonts/Gilroy-Black.ttf") format("truetype");
  font-weight: 900;
  font-style: normal;
  font-display: swap;
}

      .heading-display {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 700;
        letter-spacing: -0.025em;
      }

      :root {
        --swiggy: #FB5404;
        --swiggy-dark: #D94600;
        --swiggy-light: #FEF0E6;
        --swiggy-border: #FBD4B4;
        --ink: #141414;
        --muted: #72665C;
        --line: #E3DDD5;
        --bg: #F8F5F1;
        --card: #FFFFFF;
        --sidebar: #1C1612;
        --sidebar-muted: #A8A09A;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Gilroy', 'Inter', system-ui, -apple-system, sans-serif;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.55;
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        position: relative;
        overflow-x: hidden;
      }

      /* Premium Noise Texture Overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.04;
        z-index: -1;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .font-black { font-weight: 900 !important; }
      .font-extrabold { font-weight: 800 !important; }
      .font-bold { font-weight: 700 !important; }

      h1, h2, h3, h4, h5, h6 {
        font-family: 'Gilroy', sans-serif;
        letter-spacing: -0.02em;
      }

      .bg-swiggy-orange { background-color: var(--swiggy); }
      .text-swiggy-orange { color: var(--swiggy); }
      
      /* Refined elevation system — no more 80px blur theatrics */
      .swiggy-shadow {
        box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
      }

      .premium-card-shadow {
        box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 0 0 1px rgba(227,221,213,0.9);
      }

      .card-lift {
        box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 0 0 1px rgba(251,84,4,0.14);
      }

      .logo-inner-glow {
        box-shadow:
          inset 0 1px 3px rgba(255,255,255,0.5),
          0 8px 28px rgba(251,84,4,0.3);
      }

      input:focus {
        box-shadow: 0 0 0 3px rgba(251,84,4,0.1), 0 0 0 1px rgba(251,84,4,0.28);
      }

      /* Sharp, intentional primary button */
      .swiggy-btn-gradient {
        background: linear-gradient(155deg, #FF6420 0%, #F84E02 100%);
        box-shadow: 0 4px 16px -2px rgba(251,84,4,0.45), inset 0 1px 0 rgba(255,255,255,0.18);
        position: relative;
        overflow: hidden;
        transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .swiggy-btn-gradient::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 50%);
        pointer-events: none;
      }

      .swiggy-btn-gradient:hover {
        background: linear-gradient(155deg, #FF6B28 0%, #FA5508 100%);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px -2px rgba(251,84,4,0.52), inset 0 1px 0 rgba(255,255,255,0.18);
      }

      .swiggy-btn-gradient:active {
        transform: translateY(0) scale(0.985);
        box-shadow: 0 2px 10px rgba(251,84,4,0.38);
      }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #C8BFB5; }
    </style>
  <script type="importmap">
{
  "imports": {

    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.1",
    "vite": "https://esm.sh/vite@^7.3.1",

    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
