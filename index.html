
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Growth Catalyst Program</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/gilroy-offline" rel="stylesheet">
    <style>
      :root {
        --swiggy: #FB5404;
        --swiggy-dark: #E14A00;
        --swiggy-light: #FFF2E6;
        --swiggy-border: #FFD2B5;
        --ink: #0F172A;
        --muted: #475569;
        --line: #E2E8F0;
        --bg: #FFF8F2;
        --card: #FFFFFF;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Gilroy', 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.55;
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        position: relative;
        overflow-x: hidden;
      }

      /* Premium Noise Texture Overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.04;
        z-index: -1;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .font-black { font-weight: 900 !important; }
      .font-extrabold { font-weight: 800 !important; }
      .font-bold { font-weight: 700 !important; }

      h1, h2, h3, h4, h5, h6 {
        font-family: 'Gilroy', sans-serif;
        letter-spacing: -0.02em;
      }

      .bg-swiggy-orange { background-color: var(--swiggy); }
      .text-swiggy-orange { color: var(--swiggy); }
      
      .swiggy-shadow { 
        box-shadow: 0 12px 40px rgba(251, 84, 4, 0.08); 
      }

      .premium-card-shadow {
        box-shadow: 
          0 40px 80px -12px rgba(251, 84, 4, 0.12), 
          0 20px 40px -20px rgba(0, 0, 0, 0.05),
          inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      }

      .logo-inner-glow {
        box-shadow: 
          inset 0 2px 6px rgba(255, 255, 255, 0.5), 
          0 20px 40px rgba(251, 84, 4, 0.3);
      }

      input:focus {
        box-shadow: 0 0 0 4px rgba(251, 84, 4, 0.15);
      }

      .swiggy-btn-gradient {
        background: linear-gradient(135deg, #FB5404 0%, #FF7B3D 100%);
        box-shadow: 0 12px 30px -5px rgba(251, 84, 4, 0.4);
        position: relative;
        overflow: hidden;
      }

      .swiggy-btn-gradient::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 50%);
        pointer-events: none;
      }

      .swiggy-btn-gradient:hover {
        background: linear-gradient(135deg, #FF6825 0%, #FF8A58 100%);
        transform: translateY(-2px);
      }

      .swiggy-btn-gradient:active {
        transform: translateY(0) scale(0.98);
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: #CBD5E1;
        border-radius: 10px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0",
    "recharts": "https://esm.sh/recharts@2.13.3?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
